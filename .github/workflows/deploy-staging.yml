name: Deploy Staging

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: npm i -g pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @absenin/api db:generate
      - run: pnpm lint
      - run: pnpm type-check
      - run: pnpm test
      - run: pnpm build

  deploy:
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.STAGING_PORT }}" -H "${{ secrets.STAGING_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via native SSH
        run: |
          set -e
          ssh -i ~/.ssh/id_ed25519 -p "${{ secrets.STAGING_PORT }}" "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}" << 'EOF'
            set -e
            cd "${{ secrets.STAGING_APP_DIR }}"

            git fetch --all
            git reset --hard origin/main

            command -v pnpm >/dev/null 2>&1 || corepack enable && corepack prepare pnpm@10 --activate
            pnpm install --frozen-lockfile
            pnpm --filter @absenin/api db:generate
            pnpm build

            cd apps/api
            npx prisma migrate deploy
            cd ../..

            pm2 restart absenin-api || pm2 start "pnpm --filter @absenin/api start" --name absenin-api
            pm2 restart absenin-web || pm2 start "pnpm --filter @absenin/web start -p 3000" --name absenin-web
            pm2 save

            nginx -t || sudo -n nginx -t
            systemctl reload nginx || sudo -n systemctl reload nginx
          EOF
