name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  NODE_VERSION: 22
  PNPM_VERSION: 10

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @absenin/api db:generate

      - name: Run Lint
        run: pnpm lint

      - name: Run Type Check
        run: pnpm type-check

      - name: Build All Packages
        run: pnpm build

  deploy:
    name: Deploy to Staging
    needs: quality-gate
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.absenin.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: npm i -g pnpm

      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          SSH_HOST: ${{ secrets.STAGING_HOST }}
          SSH_PORT: ${{ secrets.STAGING_PORT }}
          SSH_USER: ${{ secrets.STAGING_USER }}
          APP_DIR: ${{ secrets.STAGING_APP_DIR || '/var/www/absenin' }}
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/id_ed25519 -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << 'EOF'
            set -e
            cd "$APP_DIR"

            # Pull latest code
            git fetch --all
            git reset --hard origin/main

            # Install dependencies
            command -v pnpm >/dev/null 2>&1 || corepack enable && corepack prepare pnpm@10 --activate
            pnpm install --frozen-lockfile

            # Generate Prisma client
            pnpm --filter @absenin/api db:generate

            # Build project
            pnpm build

            # Run migrations
            cd apps/api
            npx prisma migrate deploy
            cd ../..

            # Restart services
            pm2 restart absenin-api || pm2 start "pnpm --filter @absenin/api start" --name absenin-api
            pm2 restart absenin-web || pm2 start "pnpm --filter @absenin/web start -p 3000" --name absenin-web
            pm2 save

            # Reload nginx
            nginx -t || sudo -n nginx -t
            systemctl reload nginx || sudo -n systemctl reload nginx
          EOF

  health-check:
    name: Verify Deployment Health
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for services to start
        run: sleep 30

      - name: Check API Health
        run: |
          curl -f https://staging.absenin.com/api/health || exit 1
          echo "✅ API health check passed"

      - name: Check WhatsApp Integration Health
        run: |
          curl -f https://staging.absenin.com/api/whatsapp/health || exit 1
          echo "✅ WhatsApp health check passed"

      - name: Check Database Connectivity
        run: |
          curl -f https://staging.absenin.com/api/whatsapp/status || exit 1
          echo "✅ Database connectivity check passed"

      - name: Verify Web Access
        run: |
          curl -fI https://staging.absenin.com/login || exit 1
          echo "✅ Web access check passed"

      - name: Report Success
        run: |
          echo "========================================"
          echo "✅ Deployment successful!"
          echo "========================================"
          echo ""
          echo "Staging URL: https://staging.absenin.com"
          echo "API Health: https://staging.absenin.com/api/health"
          echo "WhatsApp: https://staging.absenin.com/api/whatsapp/health"
          echo ""
